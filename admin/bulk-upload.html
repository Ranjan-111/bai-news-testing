<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bulk Upload - BAI.NEWS</title>
    <link rel="stylesheet" href="/layout/layout.css">
    <style>
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: #fff; color: #333; margin: 0; }
        
        /* --- HEADER STYLES (Match Privacy Policy) --- */
        .bulk-header {
            display: flex;
            align-items: center;
            justify-content: center; 
            position: sticky;
            top: 0;
            width: 100%;
            background: #fff;
            height: 67px;
            box-shadow: 0 0 1px 0;
            z-index: 1000;
        }

        .back-btn {
            position: absolute;
            left: 20px; 
            color: #000;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .bulk-header h1 {
            font-size: 1.25rem; 
            font-weight: 400;
            letter-spacing: -0.02em;
            margin: 0;
        }

        /* --- CONTAINER --- */
        .admin-container { max-width: 600px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        
        .sub-text { color: #666; font-size: 0.95rem; margin-bottom: 40px; margin-top: 10px; }

        /* Upload Box */
        .upload-area {
            background-color: #f2f2f2;
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 40px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 30px;
        }
        .upload-area:hover { background-color: #e6e6e6; border-color: #999; }
        .icon-large { width: 48px; height: 48px; opacity: 0.5; margin-bottom: 15px; }

        /* Button */
        .btn-black {
            background: #000; color: #fff; border: none; 
            padding: 15px 30px; font-size: 1rem; border-radius: 8px; 
            cursor: pointer; width: 100%; transition: opacity 0.2s;
        }
        .btn-black:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Logs */
        .log-console {
            background: #111; color: #0f0; 
            font-family: monospace; font-size: 0.85rem;
            padding: 15px; border-radius: 8px;
            text-align: left; height: 200px; overflow-y: auto;
            margin-top: 30px; display: none;
        }
        .log-line { margin: 5px 0; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .log-error { color: #ff4444; }
        .log-success { color: #00cc00; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="bulk-header">
        <a href="/admin/dashboard.html" class="back-btn">
            <img width="25" height="25" src="https://img.icons8.com/pixels/32/u-turn-to-left.png" alt="Back"/>
        </a>
        <h1>Bulk Article Upload</h1>
    </header>

    <div class="admin-container">
        
        <p class="sub-text">Upload a .json file containing an array of articles.</p>

        <div class="upload-area" id="drop-zone">
            <img src="https://img.icons8.com/ios/100/json.png" class="icon-large">
            <h3>Click to Select JSON File</h3>
            <p id="file-name" style="color:#d73634; margin-top:10px; font-weight:500;"></p>
            <input type="file" id="json-input" accept=".json" hidden>
        </div>

        <button id="btn-upload" class="btn-black" disabled>Start Upload</button>

        <div id="logger" class="log-console"></div>

    </div>

    <script type="module" src="bulk-upload.js"></script>

</body>
</html>
