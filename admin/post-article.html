<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Post Article - bitfeed</title>
    
    <link rel="stylesheet" href="/layout/layout.css">
    <link rel="stylesheet" href="/main/index.css">
    <!-- Include article.css so the preview overlay gets correct styling -->
    <link rel="stylesheet" href="/articles/article.css">
    <link rel="stylesheet" href="/admin/post-article.css">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/favicon.png">

    <!-- Chart.js for premium data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <!-- Inter font for chart typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

    <header class="post-header">
        <a class="back-btn">
         <img width="25" height="25" src="https://img.icons8.com/pixels/32/u-turn-to-left.png" alt="u-turn-to-left" class="back-btn" onclick="history.back()"/>
        </a>
        <h1><a href="/" style="font-weight: 400;">post article</a></h1>
    </header>

    <div class="form-container">
        <form id="post-form">
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="inp-author" class="form-input" placeholder="Bharat AI Insights" readonly>
            </div>

            <div class="form-group">
                <label>Date Posted</label>
                <input type="text" id="inp-date" class="form-input" placeholder="2025-12-27T..." readonly>
            </div>

            <div class="form-group">
                <label>Title</label>
                <input type="text" id="inp-title" class="form-input" placeholder="Enter title..." required>
            </div>

            <div class="form-group">
                <label>Choose Image</label>
                <div class="img-preview-box" id="img-preview-box">
                    <span class="no-img-text" id="no-img-text">No image selected</span>
                    <img id="img-preview" class="hidden" alt="Selected Image">
                </div>
                <div class="img-suggestions" id="img-suggest-options">
                    <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">Image Tags:</div>
                    <!-- Dynamically loaded from /assets/tags/img-tags.json -->
                </div>
            </div>

                <label>Secondary Tag — Company (Max 2)</label>
                <div class="company-tags">
                    <div class="company-tag-option"><input type="checkbox" name="company-tag" value="Google"><label>Google</label></div>

                    <div class="company-tag-option"><input type="checkbox" name="company-tag" value="Samsung"><label>Samsung</label></div>
                    <div class="company-tag-option"><input type="checkbox" name="company-tag" value="xAI"><label>xAI</label></div>

            <div class="form-group">
                <label>Concise Content</label>
                <div class="md-editor-wrap">
                    <button type="button" class="md-toolbar-toggle" onclick="this.parentElement.querySelector('.md-toolbar').classList.toggle('active')" title="Formatting">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    </button>
                    <div class="md-toolbar">
                        <button type="button" onclick="applyStyle('h1','inp-content-concise')">H1</button>
                        <button type="button" onclick="applyStyle('h2','inp-content-concise')">H2</button>
                        <button type="button" onclick="applyStyle('h3','inp-content-concise')">H3</button>
                        <span class="md-toolbar-sep"></span>
                        <button type="button" onclick="applyStyle('bold','inp-content-concise')"><b>B</b></button>
                        <button type="button" onclick="applyStyle('italic','inp-content-concise')"><i>I</i></button>
                        <button type="button" onclick="applyStyle('list','inp-content-concise')">• List</button>
                        <button type="button" onclick="applyStyle('code','inp-content-concise')">&lt;/&gt;</button>
                        <button type="button" onclick="applyStyle('quote','inp-content-concise')">" Quote</button>
                        <button type="button" onclick="applyStyle('hr','inp-content-concise')">― Line</button>
                        <button type="button" onclick="applyStyle('table','inp-content-concise')">⊞ Table</button>
                        <span class="md-toolbar-sep"></span>
                        <button type="button" onclick="applyStyle('bar','inp-content-concise')" title="Bar Chart">📊 Bar</button>
                        <button type="button" onclick="applyStyle('hbar','inp-content-concise')" title="Horizontal Bar">📊 H-Bar</button>
                        <button type="button" onclick="applyStyle('stacked','inp-content-concise')" title="Stacked Bar">📊 Stacked</button>
                        <button type="button" onclick="applyStyle('line','inp-content-concise')" title="Line Graph">📈 Line</button>
                        <button type="button" onclick="applyStyle('area','inp-content-concise')" title="Area Chart">📉 Area</button>
                        <button type="button" onclick="applyStyle('pie','inp-content-concise')" title="Pie Chart">🥧 Pie</button>
                        <button type="button" onclick="applyStyle('doughnut','inp-content-concise')" title="Doughnut Chart">🍩 Doughnut</button>
                        <button type="button" onclick="applyStyle('radar','inp-content-concise')" title="Radar Chart">🕸 Radar</button>
                        <button type="button" onclick="applyStyle('polar','inp-content-concise')" title="Polar Area">🎯 Polar</button>
                        <button type="button" onclick="applyStyle('scatter','inp-content-concise')" title="Scatter Plot">⊙ Scatter</button>
                        <button type="button" onclick="applyStyle('bubble','inp-content-concise')" title="Bubble Chart">◉ Bubble</button>
                    </div>
                    <textarea id="inp-content-concise" class="form-input textarea" placeholder="Write concise version using Markdown (### headings, **bold**, - lists)..."></textarea>
                </div>
                <label class="preview-label" id="preview-label-concise" style="display:none; margin-top: 15px; font-size: 0.85rem; color: #888;">Preview</label>
                <div id="preview-concise" class="md-preview" style="display:none;"></div>
            </div>

            <div class="form-group">
                <label>Technical Content</label>
                <div class="md-editor-wrap">
                    <button type="button" class="md-toolbar-toggle" onclick="this.parentElement.querySelector('.md-toolbar').classList.toggle('active')" title="Formatting">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    </button>
                    <div class="md-toolbar">
                        <button type="button" onclick="applyStyle('h1','inp-content-technical')">H1</button>
                        <button type="button" onclick="applyStyle('h2','inp-content-technical')">H2</button>
                        <button type="button" onclick="applyStyle('h3','inp-content-technical')">H3</button>
                        <span class="md-toolbar-sep"></span>
                        <button type="button" onclick="applyStyle('bold','inp-content-technical')"><b>B</b></button>
                        <button type="button" onclick="applyStyle('italic','inp-content-technical')"><i>I</i></button>
                        <button type="button" onclick="applyStyle('list','inp-content-technical')">• List</button>
                        <button type="button" onclick="applyStyle('code','inp-content-technical')">&lt;/&gt;</button>
                        <button type="button" onclick="applyStyle('quote','inp-content-technical')">" Quote</button>
                        <button type="button" onclick="applyStyle('hr','inp-content-technical')">― Line</button>
                        <button type="button" onclick="applyStyle('table','inp-content-technical')">⊞ Table</button>
                        <span class="md-toolbar-sep"></span>
                        <button type="button" onclick="applyStyle('bar','inp-content-technical')" title="Bar Chart">📊 Bar</button>
                        <button type="button" onclick="applyStyle('hbar','inp-content-technical')" title="Horizontal Bar">📊 H-Bar</button>
                        <button type="button" onclick="applyStyle('stacked','inp-content-technical')" title="Stacked Bar">📊 Stacked</button>
                        <button type="button" onclick="applyStyle('line','inp-content-technical')" title="Line Graph">📈 Line</button>
                        <button type="button" onclick="applyStyle('area','inp-content-technical')" title="Area Chart">📉 Area</button>
                        <button type="button" onclick="applyStyle('pie','inp-content-technical')" title="Pie Chart">🥧 Pie</button>
                        <button type="button" onclick="applyStyle('doughnut','inp-content-technical')" title="Doughnut Chart">🍩 Doughnut</button>
                        <button type="button" onclick="applyStyle('radar','inp-content-technical')" title="Radar Chart">🕸 Radar</button>
                        <button type="button" onclick="applyStyle('polar','inp-content-technical')" title="Polar Area">🎯 Polar</button>
                        <button type="button" onclick="applyStyle('scatter','inp-content-technical')" title="Scatter Plot">⊙ Scatter</button>
                        <button type="button" onclick="applyStyle('bubble','inp-content-technical')" title="Bubble Chart">◉ Bubble</button>
                    </div>
                    <textarea id="inp-content-technical" class="form-input textarea" placeholder="Write technical version using Markdown (### headings, **bold**, - lists)..." required></textarea>
                </div>
                <label class="preview-label" id="preview-label-technical" style="display:none; margin-top: 15px; font-size: 0.85rem; color: #888;">Preview</label>
                <div id="preview-technical" class="md-preview" style="display:none;"></div>
            </div>

            <div class="form-group">
                <label>Summary (300 characters)</label>
                <input type="text" id="inp-summary" class="form-input" minlength="50" maxlength="300"  placeholder="Write...">
            </div>

            <div class="form-group">
                <label>Additional Tags (Max 5)</label>
                <div class="tags-input-container" id="tags-container">
                    <input type="text" id="inp-tag-input" placeholder="Type & Press Enter" autocomplete="off">
                </div>
                <div class="tag-suggestions" id="tag-suggestions">
                </div>
            </div>

            <div class="submit-row">
                <button type="button" class="preview-btn" id="btn-preview">Preview</button>
                <button type="submit" class="submit-btn">Send for Approval</button>
            </div>

        </form>
    </div>


    <script type="module" src="/admin/post-article.js"></script>

</body>
</html>
