<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - BAI.NEWS</title>
    <link rel="stylesheet" href="/layout/layout.css">
    <style>
        body { background-color: #f9f9f9; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; display: block; }
        .dash-container { max-width: 900px; margin: 60px auto; padding: 20px; text-align: center; }
        
        .dash-header h1 { font-weight: 300; margin-bottom: 10px; font-size: 2rem; }
        .dash-header p { color: #666; margin-bottom: 50px; }

        .options-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }

        .dash-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 40px;
            width: 300px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dash-card:hover { border-color: #d73634; }

        .dash-icon { width: 64px; height: 64px; margin-bottom: 20px; opacity: 0.8; }
        .dash-title { font-size: 1.2rem; font-weight: 500; margin-bottom: 10px; }
        .dash-desc { font-size: 0.9rem; color: #777; line-height: 1.5; }

    </style>
</head>
<body>

    <div class="dash-container">
        
        <div class="dash-header">
            <h1>Admin Dashboard</h1>
            <p>Select an administrative task to continue</p>
        </div>

        <div class="options-grid">
            
            <a href="/admin/article-requests.html" class="dash-card">
                <img src="https://img.icons8.com/ios/100/news.png" class="dash-icon" alt="Articles">
                <div class="dash-title">Review Articles</div>
                <div class="dash-desc">Approve, Edit, or Reject pending article submissions.</div>
            </a>

            <a href="/admin/panel.html" class="dash-card">
                <img src="https://img.icons8.com/ios/100/conference-call.png" class="dash-icon" alt="Reporters">
                <div class="dash-title">Review Reporters</div>
                <div class="dash-desc">Manage user roles and approve applications.</div>
            </a>

            <a href="/admin/bulk-upload.html" class="dash-card">
                <img src="https://img.icons8.com/ios/100/upload-to-cloud.png" class="dash-icon" alt="Upload">
                <div class="dash-title">Bulk Upload</div>
                <div class="dash-desc">Directly upload multiple articles from a JSON file.</div>
            </a>

        </div>
        <br><br><br>
        <a href="/main/index.html" style="color: #999; text-decoration: underline; font-size: 0.9rem;">Back to Home</a>

    </div>

    <script type="module">
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { app } from '/Article/firebase-db.js';

        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) return window.location.href = "/main/index.html";
            
            // Double check admin role
            const snap = await getDoc(doc(db, "users", user.email));
            if (!snap.exists() || snap.data().role !== 'admin') {
                alert("Access Denied");
                window.location.href = "/main/index.html";
            }
        });
    </script>

</body>
</html>
