<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Requests - bitfeed</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/layout/layout.css">
    <link rel="stylesheet" href="/admin/article-requests.css">
    <link rel="stylesheet" href="/admin/post-article.css">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/favicon.png">

    <!-- Chart.js for premium data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <!-- Inter font for chart typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

    <div id="list-view">
        <header class="admin-header">
            <img src="https://img.icons8.com/pixels/32/u-turn-to-left.png" 
                 class="header-back-btn" 
                 onclick="history.back()"
                 alt="Back">
            <a href="/"><h1>Pending Article Requests</h1></a>
        </header>

        <div class="admin-container">
            <div class="warning-box">
                <p class="sub-warning">Only Approve <strong>10</strong> articles per day.</p>
            </div>

            <div id="loading" style="text-align:center; color:#999; margin-top: 50px;">Loading...</div>
            <div id="list-content">
                </div>
        </div>
    </div>

    <div id="detail-view" class="hidden">
        <header class="admin-header">
            <img src="https://img.icons8.com/pixels/32/u-turn-to-left.png" 
                 class="header-back-btn" 
                 id="back-btn" 
                 alt="Back">
            <a href="/"><h1>Article Review</h1></a>
        </header>

        <div class="admin-container">
            <form id="edit-form">
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" id="edit-title" class="edit-input">
                </div>

                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="edit-author" class="edit-input" readonly style="color:#777;">
                </div>

                <div class="form-group">
                    <label class="form-label">Date Posted</label>
                    <input type="text" id="edit-date" class="edit-input" readonly style="color:#777;">
                </div>

                <div class="form-group">
                    <label class="form-label">Choose Image</label>
                    <div class="img-preview-box" id="img-preview-box">
                        <span class="no-img-text" id="no-img-text">No image selected</span>
                        <img id="edit-img-preview" class="hidden" alt="Selected Image">
                    </div>
                    <div class="img-suggestions" id="edit-img-suggest-options">
                        <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">Image Tags:</div>
                        <!-- Dynamically loaded from /assets/tags/img-tags.json -->
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Concise Content</label>
                    <div class="md-editor-wrap">
                        <button type="button" class="md-toolbar-toggle" onclick="this.parentElement.querySelector('.md-toolbar').classList.toggle('active')" title="Formatting">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        </button>
                        <div class="md-toolbar">
                            <button type="button" onclick="applyStyle('h1','edit-content-concise')">H1</button>
                            <button type="button" onclick="applyStyle('h2','edit-content-concise')">H2</button>
                            <button type="button" onclick="applyStyle('h3','edit-content-concise')">H3</button>
                            <span class="md-toolbar-sep"></span>
                            <button type="button" onclick="applyStyle('bold','edit-content-concise')"><b>B</b></button>
                            <button type="button" onclick="applyStyle('italic','edit-content-concise')"><i>I</i></button>
                            <button type="button" onclick="applyStyle('list','edit-content-concise')">• List</button>
                            <button type="button" onclick="applyStyle('code','edit-content-concise')">&lt;/&gt;</button>
                            <button type="button" onclick="applyStyle('quote','edit-content-concise')">" Quote</button>
                            <button type="button" onclick="applyStyle('hr','edit-content-concise')">― Line</button>
                            <button type="button" onclick="applyStyle('table','edit-content-concise')">⊞ Table</button>
                            <span class="md-toolbar-sep"></span>
                            <button type="button" onclick="applyStyle('bar','edit-content-concise')" title="Bar Chart">📊 Bar</button>
                            <button type="button" onclick="applyStyle('hbar','edit-content-concise')" title="Horizontal Bar">📊 H-Bar</button>
                            <button type="button" onclick="applyStyle('stacked','edit-content-concise')" title="Stacked Bar">📊 Stacked</button>
                            <button type="button" onclick="applyStyle('line','edit-content-concise')" title="Line Graph">📈 Line</button>
                            <button type="button" onclick="applyStyle('area','edit-content-concise')" title="Area Chart">📉 Area</button>
                            <button type="button" onclick="applyStyle('pie','edit-content-concise')" title="Pie Chart">🥧 Pie</button>
                            <button type="button" onclick="applyStyle('doughnut','edit-content-concise')" title="Doughnut Chart">🍩 Doughnut</button>
                            <button type="button" onclick="applyStyle('radar','edit-content-concise')" title="Radar Chart">🕸 Radar</button>
                            <button type="button" onclick="applyStyle('polar','edit-content-concise')" title="Polar Area">🎯 Polar</button>
                            <button type="button" onclick="applyStyle('scatter','edit-content-concise')" title="Scatter Plot">⊙ Scatter</button>
                            <button type="button" onclick="applyStyle('bubble','edit-content-concise')" title="Bubble Chart">◉ Bubble</button>
                        </div>
                        <textarea id="edit-content-concise" class="edit-input edit-textarea"></textarea>
                    </div>
                    <label class="form-label" style="display:none; margin-top: 10px; font-size: 0.85rem; color: #888;">Preview</label>
                    <div id="preview-content-concise" class="md-preview" style="display:none;"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Technical Content</label>
                    <div class="md-editor-wrap">
                        <button type="button" class="md-toolbar-toggle" onclick="this.parentElement.querySelector('.md-toolbar').classList.toggle('active')" title="Formatting">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        </button>
                        <div class="md-toolbar">
                            <button type="button" onclick="applyStyle('h1','edit-content-technical')">H1</button>
                            <button type="button" onclick="applyStyle('h2','edit-content-technical')">H2</button>
                            <button type="button" onclick="applyStyle('h3','edit-content-technical')">H3</button>
                            <span class="md-toolbar-sep"></span>
                            <button type="button" onclick="applyStyle('bold','edit-content-technical')"><b>B</b></button>
                            <button type="button" onclick="applyStyle('italic','edit-content-technical')"><i>I</i></button>
                            <button type="button" onclick="applyStyle('list','edit-content-technical')">• List</button>
                            <button type="button" onclick="applyStyle('code','edit-content-technical')">&lt;/&gt;</button>
                            <button type="button" onclick="applyStyle('quote','edit-content-technical')">" Quote</button>
                            <button type="button" onclick="applyStyle('hr','edit-content-technical')">― Line</button>
                            <button type="button" onclick="applyStyle('table','edit-content-technical')">⊞ Table</button>
                            <span class="md-toolbar-sep"></span>
                            <button type="button" onclick="applyStyle('bar','edit-content-technical')" title="Bar Chart">📊 Bar</button>
                            <button type="button" onclick="applyStyle('hbar','edit-content-technical')" title="Horizontal Bar">📊 H-Bar</button>
                            <button type="button" onclick="applyStyle('stacked','edit-content-technical')" title="Stacked Bar">📊 Stacked</button>
                            <button type="button" onclick="applyStyle('line','edit-content-technical')" title="Line Graph">📈 Line</button>
                            <button type="button" onclick="applyStyle('area','edit-content-technical')" title="Area Chart">📉 Area</button>
                            <button type="button" onclick="applyStyle('pie','edit-content-technical')" title="Pie Chart">🥧 Pie</button>
                            <button type="button" onclick="applyStyle('doughnut','edit-content-technical')" title="Doughnut Chart">🍩 Doughnut</button>
                            <button type="button" onclick="applyStyle('radar','edit-content-technical')" title="Radar Chart">🕸 Radar</button>
                            <button type="button" onclick="applyStyle('polar','edit-content-technical')" title="Polar Area">🎯 Polar</button>
                            <button type="button" onclick="applyStyle('scatter','edit-content-technical')" title="Scatter Plot">⊙ Scatter</button>
                            <button type="button" onclick="applyStyle('bubble','edit-content-technical')" title="Bubble Chart">◉ Bubble</button>
                        </div>
                        <textarea id="edit-content-technical" class="edit-input edit-textarea"></textarea>
                    </div>
                    <label class="form-label" style="display:none; margin-top: 10px; font-size: 0.85rem; color: #888;">Preview</label>
                    <div id="preview-content-technical" class="md-preview" style="display:none;"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Summary (50 words)</label>
                    <textarea id="edit-summary" class="edit-input summary-textarea"></textarea>
                </div>

                    <label class="form-label">Secondary Tag — Company (Max 2)</label>
                    <div class="company-tags">
                        <div class="company-tag-option"><input type="checkbox" name="company-tag" value="Google"><label>Google</label></div>

                        <div class="company-tag-option"><input type="checkbox" name="company-tag" value="Meta"><label>Meta</label></div>
                        <div class="company-tag-option"><input type="checkbox" name="company-tag" value="Microsoft"><label>Microsoft</label></div>

                <div class="form-group">
                    <label class="form-label">Additional Tags (Max 5)</label>
                    <div class="tags-input-container" id="edit-tags-container">
                        <input type="text" id="edit-tag-input" placeholder="Type & Press Enter" autocomplete="off">
                    </div>
                    <div class="tag-suggestions" id="tag-suggestions">
                    </div>
                </div>

                <div class="feature-row">
                    <input type="checkbox" id="check-featured" class="feature-checkbox">
                    <label for="check-featured" class="feature-label">Mark as Featured</label>
                </div>

                <div class="action-row">
                    <button type="button" class="btn-approve" id="btn-publish">Approval & Publish</button>
                    <button type="button" class="btn-reject" id="btn-reject-final">Reject</button>
                </div>
            </form>
        </div>
    </div>



    <script type="module" src="/admin/article-requests.js"></script>

</body>
</html>
