<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Requests - bitfeed</title>
    <link rel="stylesheet" href="/layout/layout.css">
    <link rel="stylesheet" href="article-requests.css">
        <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/favicon.png">

</head>
<body>

    <div id="list-view">
        <header class="admin-header">
            <img src="https://img.icons8.com/pixels/32/u-turn-to-left.png" 
                 class="header-back-btn" 
                 onclick="history.back()"
                 alt="Back">
            <a href="/main/index.html"><h1>Pending Article Requests</h1></a>
        </header>

        <div class="admin-container">
            <div class="warning-box">
                <p class="sub-warning">Only Approve <strong>10</strong> articles per day.</p>
            </div>

            <div id="loading" style="text-align:center; color:#999; margin-top: 50px;">Loading...</div>
            <div id="list-content">
                </div>
        </div>
    </div>

    <div id="detail-view" class="hidden">
        <header class="admin-header">
            <img src="https://img.icons8.com/pixels/32/u-turn-to-left.png" 
                 class="header-back-btn" 
                 id="back-btn" 
                 alt="Back">
            <a href="/main/index.html"><h1>Article Review</h1></a>
        </header>

        <div class="admin-container">
            <form id="edit-form">
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" id="edit-title" class="edit-input">
                </div>

                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="edit-author" class="edit-input" readonly style="color:#777;">
                </div>

                <div class="form-group">
                    <label class="form-label">Date Posted</label>
                    <input type="text" id="edit-date" class="edit-input" readonly style="color:#777;">
                </div>

                <div class="form-group">
                    <label class="form-label">Choose Image</label>
                    <div class="img-preview-box" id="img-preview-box">
                        <span class="no-img-text" id="no-img-text">No image selected</span>
                        <img id="edit-img-preview" class="hidden" alt="Selected Image">
                    </div>
                    <div class="img-suggestions">
                        <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">Image Tags:</div>
                        <div class="img-suggest-option">
                            <input type="radio" name="img-suggest" id="suggest-alg" value="/assets/article-img/alg.png" data-tag="Algorithm">
                            <label for="suggest-alg">Algorithm</label>
                        </div>
                        <div class="img-suggest-option">
                            <input type="radio" name="img-suggest" id="suggest-img-m" value="/assets/article-img/img-m.png" data-tag="Image Model">
                            <label for="suggest-img-m">Image Model</label>
                        </div>
                        <div class="img-suggest-option">
                            <input type="radio" name="img-suggest" id="suggest-llm" value="/assets/article-img/llm.png" data-tag="LLM">
                            <label for="suggest-llm">LLM</label>
                        </div>
                        <div class="img-suggest-option">
                            <input type="radio" name="img-suggest" id="suggest-research" value="/assets/article-img/research.png" data-tag="Research">
                            <label for="suggest-research">Research</label>
                        </div>
                        <div class="img-suggest-option">
                            <input type="radio" name="img-suggest" id="suggest-rob" value="/assets/article-img/rob.png" data-tag="Robotics">
                            <label for="suggest-rob">Robotics</label>
                        </div>
                        <div class="img-suggest-option">
                            <input type="radio" name="img-suggest" id="suggest-sec" value="/assets/article-img/sec.png" data-tag="Security">
                            <label for="suggest-sec">Security</label>
                        </div>
                        <div class="img-suggest-option">
                            <input type="radio" name="img-suggest" id="suggest-vid-m" value="/assets/article-img/vid-m.png" data-tag="Video Model">
                            <label for="suggest-vid-m">Video Model</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Concise Content</label>
                    <textarea id="edit-content-concise" class="edit-input edit-textarea"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Technical Content</label>
                    <textarea id="edit-content-technical" class="edit-input edit-textarea"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Summary (50 words)</label>
                    <textarea id="edit-summary" class="edit-input summary-textarea"></textarea>
                </div>

                    <label class="form-label">Secondary Tag — Company (Max 2)</label>

                <div class="form-group">
                    <label class="form-label">Additional Tags (Max 5)</label>
                    <div class="tags-input-container" id="edit-tags-container">
                        <input type="text" id="edit-tag-input" placeholder="Type & Press Enter" autocomplete="off">
                    </div>
                    <div class="tag-suggestions" id="tag-suggestions">
                        <p style="font-size: 0.8rem; color: #888; margin-bottom: 5px;">Suggestions:</p>
                        <span class="tag-suggest-btn" data-tag="Training">Training</span>
                        <span class="tag-suggest-btn" data-tag="Benchmark">Benchmark</span>
                        <span class="tag-suggest-btn" data-tag="Open Source">Open Source</span>
                        <span class="tag-suggest-btn" data-tag="Multimodal">Multimodal</span>
                        <span class="tag-suggest-btn" data-tag="Funding">Funding</span>
                        <span class="tag-suggest-btn" data-tag="Regulation">Regulation</span>
                        <span class="tag-suggest-btn" data-tag="Hardware">Hardware</span>
                        <span class="tag-suggest-btn" data-tag="Dataset">Dataset</span>
                    </div>
                </div>

                <div class="feature-row">
                    <input type="checkbox" id="check-featured" class="feature-checkbox">
                    <label for="check-featured" class="feature-label">Mark as Featured</label>
                </div>

                <div class="action-row">
                    <button type="button" class="btn-approve" id="btn-publish">Approval & Publish</button>
                    <button type="button" class="btn-reject" id="btn-reject-final">Reject</button>
                </div>
            </form>
        </div>
    </div>



    <script type="module" src="article-requests.js"></script>

</body>
</html>
