<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - bai.news</title>
    <link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;500;700&family=Montserrat:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="user.css">
</head>
<body>
   
    <div id="global-header"></div>

    <div class="container">
        <h1 class="greeting">Hi, <span id="user-name-display">Reader</span></h1>

        <div class="tabs">
            <div class="tab active" id="savedTab" onclick="switchTab('saved')">Saved News</div>
            <div class="tab" id="followingTab" onclick="switchTab('following')">Following</div>
        </div>

        <div class="content-wrapper">
            <div class="main-content">
                
                <div class="tab-content active" id="savedContent">
                    <div id="saved-articles-list">
                        <div class="loader">Loading saved articles...</div>
                    </div>
                    <button id="load-more-btn" class="see-more-btn" style="display: none;">Load More</button>
                </div>

                <div class="tab-content" id="followingContent">
                    <div id="following-list">
                        </div>
                    <div class="empty-state" id="following-empty" style="display:none;">
                        <h3>No followed reporters yet</h3>
                        <p>Start following reporters to see their content here</p>
                    </div>
                </div>

            </div>

            <div class="sidebar">
                <div class="similar-reporters">
                    <h3>More Reporters</h3>
                    
                    <div id="sidebar-reporters-list">
                        <p style="color:#999; font-size:13px;">Loading suggestions...</p>
                    </div>

                    <div class="see-more" onclick="window.location.href='../students/Students.html'">see all reporters</div>
                </div>
            </div>
        </div>
    </div>

    <div id="global-footer"></div>

    <script type="module" src="../layout/layout.js"></script>
    <script type="module" src="user-profile.js"></script>
    
    <script>
        function switchTab(tabName) {
            // Update Tab Styles
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');

            // Update Content Visibility
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabName + 'Content').classList.add('active');
        }
        window.switchTab = switchTab;
    </script>
</body>
</html>
