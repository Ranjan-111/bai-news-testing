<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Author Profile | BAI.NEWS</title>
    <link rel="stylesheet" href="../layout/layout.css">
    <link rel="stylesheet" href="author.css">
</head>
<body>

    <div id="global-header"></div>

    <main class="profile-container">
        
        <section class="profile-header">
            <div class="header-content">
                <div class="profile-img-container">
                    <img src="../assets/author-profile.jpeg" alt="Author" id="p-image">
                </div>
                
                <div class="profile-info">
                    <h1 id="p-name"></h1> <p class="p-tag" id="p-tag"></p> 
                    
                    <div class="p-stats">
                        <span id="p-followers"></span> • 
                        <span id="p-articles-count">_______</span>
                    </div>
                    
                    <div class="p-actions">
                        <button class="follow-btn">Follow</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="profile-tabs">
            <button class="tab-btn active" data-tab="home">Home</button>
            <button class="tab-btn" data-tab="about">About</button>
        </div>

        <hr class="profile-divider">

        <div class="profile-grid">
            
            <section class="auth-content-area">
                
                <div id="tab-home" class="tab-content active">
                    <h3 class="section-title">Latest Articles from <span id="home-header-name"></span></h3>
                    <div id="author-articles-list">
                        </div>
                </div>

                <div id="tab-about" class="tab-content hidden">
                    <h3 class="section-title">About <span id="about-header-name"></span></h3>
                    
                    <div class="about-details">
                        <p class="about-bio" id="p-bio">
                            </p>
                        
                        <div class="detail-row">
                            <span class="detail-label">Email:</span>
                            <span class="detail-value" id="p-email">--</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Location:</span>
                            <span class="detail-value" id="p-location">--</span>
                        </div>

                        <div class="about-socials-group">
                            <h4 class="socials-title">Connect</h4>
                            
                            <a href="#" id="social-link-x" class="about-social-row" target="_blank" style="display:none;">
                                <div class="social-icon-box">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                                </div>
                                <span id="social-text-x">_____</span>
                            </a>

                            <a href="#" id="social-link-li" class="about-social-row" target="_blank" style="display:none;">
                                <div class="social-icon-box">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"></path></svg>
                                </div>
                                <span id="social-text-li">_________</span>
                            </a>
                            
                            <a href="#" id="social-link-yt" class="about-social-row" target="_blank" style="display:none;">
                                <div class="social-icon-box">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg>
                                </div>
                                <span id="social-text-yt">_______</span>
                            </a>
                        </div>
                        
                        <div class="about-tags-container" id="about-tags-container">
                            </div>
                    </div>
                </div>

            </section>

            <aside class="auth-sidebar">
                <h3 class="section-title">Similar Reporters</h3>
                
                <div class="following-list" id="following-list">
                    </div>
                
                <a href="#" class="see-all-link" id="see-all-count">See all</a>
            </aside>
        </div>

    </main>

    <div id="global-footer"></div>

    <script src="../Article/authors-data.js"></script>
    <script src="../Article/multi-article-data.js"></script>
    
    <script defer type="module" src="../layout/layout.js"></script>
    <script src="author.js"></script>

</body>
</html>
