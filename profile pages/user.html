<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile — bitfeed</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;500;700&family=Montserrat:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Private page — do not index -->
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="View your saved articles on bitfeed.">
    <link rel="canonical" href="https://bitfeed.in/user">
    <meta property="og:title" content="User Profile — bitfeed">
    <meta property="og:description" content="View your saved articles on bitfeed.">
    <meta property="og:image" content="https://bitfeed.in/assets/favicon.png">
    <meta property="og:url" content="https://bitfeed.in/user">
    <meta property="og:type" content="profile">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="User Profile — bitfeed">
    <meta name="theme-color" content="#d73634">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/favicon.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/layout/layout.css">
    <link rel="stylesheet" href="/articles/multi-article.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="/profile pages/user.css" media="print" onload="this.media='all'">

    <style>
        .menu__icon {
            cursor: pointer;
            box-sizing: content-box;
        }
    </style>

</head>

<body>

    <div id="global-header"></div>

    <div class="container">
        <h1 class="greeting">Hi, <span id="user-name-display">Reader</span></h1>

        <h2 class="section-title">Liked News</h2>
        <hr class="header-line">

        <div class="main-content">
            <section id="saved-articles-list" class="articles-container">
                <div class="loader">Loading saved articles...</div>
            </section>
        </div>
    </div>

    <!-- Pagination Bar (same as multi-article) -->
    <div class="pagination-bar" id="pagination-container" style="display:none;">
        <div class="pagination-wrapper">
            <button onclick="changeSavedPage('prev')" class="arrow-btn" aria-label="Previous Page">
                <svg viewBox="0 0 24 24">
                    <path d="M2 12l20 10V2z" />
                </svg>
            </button>

            <div id="saved-pages-container"></div>

            <button onclick="changeSavedPage('next')" class="arrow-btn" aria-label="Next Page">
                <svg viewBox="0 0 24 24">
                    <path d="M22 12l-20 10V2z" />
                </svg>
            </button>
        </div>
    </div>

    <div id="global-footer"></div>

    <script defer type="module" src="/layout/layout.js"></script>
    <script defer type="module" src="/profile pages/user-profile.js"></script>
</body>

</html>
