<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Author Profile | BAI.NEWS</title>
    <link rel="stylesheet" href="../layout/layout.css">
    <link rel="stylesheet" href="author.css">
</head>
<body>

    <div id="global-header"></div>

    <main class="profile-container">
        
        <section class="profile-header">
            <div class="header-content">
                <div class="profile-img-container">
                    <img src="../assets/author-profile.jpeg" alt="Author" id="p-image">
                </div>
                
                <div class="profile-info">
                    <h1 id="p-name"></h1> <p class="p-tag" id="p-tag"></p> 
                    
                    <div class="p-stats">
                        <span id="p-followers"></span> • 
                        <span id="p-articles-count">_______</span>
                    </div>
                    
                    <div class="p-actions">
                        <button class="follow-btn">Follow</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="profile-tabs">
            <button class="tab-btn active" data-tab="home">Home</button>
            <button class="tab-btn" data-tab="about">About</button>
        </div>

        <hr class="profile-divider">

        <div class="profile-grid">
            
            <section class="auth-content-area">
                
                <div id="tab-home" class="tab-content active">
                    <h3 class="section-title">Latest Articles from <span id="home-header-name"></span></h3>
                    <div id="author-articles-list">
                        </div>
                </div>

<div id="tab-about" class="tab-content hidden">
    <h3 class="section-title">About <span id="about-header-name"></span></h3>
    
    <div class="about-details">
        <p class="about-bio" id="p-bio">
            </p>
        
        <div class="detail-row">
            <span class="detail-label">Location:</span>
            <span class="detail-value" id="p-location">--</span>
        </div>

        <div class="education-section">
            <h4 class="subsection-title">Education</h4>
            <div id="p-education-list" class="education-list">
                </div>
        </div>

    </div>
</div>
            </section>

            <aside class="auth-sidebar">
                <h3 class="section-title">Similar Reporters</h3>
                
                <div class="following-list" id="following-list">
                    </div>
                
                <a href="#" class="see-all-link" id="see-all-count">See all</a>
            </aside>
        </div>

    </main>

    <div id="global-footer"></div>

    <script src="../Article/authors-data.js"></script>
    <script src="../Article/multi-article-data.js"></script>
    
    <script defer type="module" src="../layout/layout.js"></script>
    <script src="author.js"></script>

</body>
</html>
