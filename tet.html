<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitFeed Generator</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            flex-direction: column; /* Allows content to stack vertically */
        }

        .container { text-align: center; max-width: 600px; width: 90%; }

        .giant-button {
            padding: 30px 60px; font-size: 1.5rem; font-weight: bold;
            color: white; background-color: #007bff; border: none;
            border-radius: 15px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        .giant-button:hover { background-color: #0056b3; transform: translateY(-2px); }
        .giant-button:disabled { background-color: #ccc; cursor: not-allowed; transform: none; }

        /* Results Styling */
        #results {
            margin-top: 30px; text-align: left; background: white;
            padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: none; width: 100%;
        }

        #loader {
            display: none; margin-top: 15px; color: #555; font-style: italic;
        }

        ol li { margin-bottom: 10px; font-weight: 500; color: #333; }
    </style>
</head>
<body>

    <div class="container">
        <label for="amountRange" style="display:block;margin-bottom:10px;">
            Articles to Generate: <span id="amountValue">5</span>
        </label>
        <input id="amountRange" type="range" min="1" max="10" value="5" style="width:100%; margin-bottom:20px;">

        <button id="generateb" class="giant-button">GENERATE</button>

        <div id="loader">Ollama is writing... this can take 2-5 minutes.</div>

        <div id="results">
            <h3 style="margin-top:0;">Generated Headlines:</h3>
            <ol id="titlesList"></ol>
        </div>
    </div>

    <script>
        (function(){
            const range = document.getElementById('amountRange');
            const amountDisplay = document.getElementById('amountValue');
            const btn = document.getElementById('generateb');
            const resultsDiv = document.getElementById('results');
            const list = document.getElementById('titlesList');
            const loader = document.getElementById('loader');

            const webhookUrl = 'http://localhost:5678/webhook-test/6e1b45b3-cfeb-4399-b22f-7c0efe99fdfa';

            range.addEventListener('input', () => {
                amountDisplay.textContent = range.value;
            });

            btn.addEventListener('click', async () => {
                const value = range.value;
                
                // Reset UI
                btn.disabled = true;
                loader.style.display = 'block';
                resultsDiv.style.display = 'none';
                list.innerHTML = '';

                try {
                    const resp = await fetch(webhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ value: Number(value) })
                    });

                    if (!resp.ok) throw new Error('Generation failed or timed out.');

                    const responseData = await resp.json();
                    
                    // Access the "data" field from your Aggregate node
                    const articles = responseData.data;

                    if (articles && articles.length > 0) {
                        articles.forEach(article => {
                            if (article.title) {
                                const li = document.createElement('li');
                                li.textContent = article.title;
                                list.appendChild(li);
                            }
                        });
                        resultsDiv.style.display = 'block';
                    } else {
                        alert('No articles found in the specified timeframe.');
                    }

                } catch (err) {
                    console.error(err);
                    alert('Error: ' + err.message);
                } finally {
                    btn.disabled = false;
                    loader.style.display = 'none';
                }
            });
        })();
    </script>

</body>
</html>
